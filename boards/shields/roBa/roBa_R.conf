CONFIG_ZMK_KEYBOARD_NAME="roBa"

# 必須の基本設定
CONFIG_ZMK_BLE=y
CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y

# センサー・ドライバーの有効化
CONFIG_SPI=y
CONFIG_INPUT=y

# エンコーダー設定
CONFIG_EC11=n
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=n

# バッテリー報告
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# ZMK Studio (これが snippet で追加したものと連動します)
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# 注意: PMW3610_CPI などの細かな設定は、公式ドライバーでは
# 名前が変わっているか、自動的に適用されるようになっています。
# まずは「ビルドを通すこと」を優先し、これら以外の
# PMW3610_... 系は一旦すべて削除（またはコメントアウト）してください。

CONFIG_ZMK_BOARD_COMPAT=y
