on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: config

      - name: West Init
        run: |
          # ディレクトリを先に作って、その中で実行するスタイルに変更
          mkdir zmk-workspace
          cd zmk-workspace
          west init -m https://github.com/zmkfirmware/zmk --mr main
          # ZMKのwest.ymlはappにあるので、そこを指定してupdate
          west update
          west zephyr-export

      - name: Build Right
        run: |
          cd zmk-workspace
          west build -s zmk/app -b xiao_ble -- \
            -DSHIELD=roBa_R \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config/config" \
            -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}/config"

      - name: Copy Artifact
        run: cp zmk-workspace/build/zephyr/zmk.uf2 roBa_R.uf2

      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "*.uf2"
