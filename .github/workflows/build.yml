on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Config
        uses: actions/checkout@v4
        with:
          path: config

      - name: Checkout ZMK
        uses: actions/checkout@v4
        with:
          repository: zmkfirmware/zmk
          ref: main
          path: zmk-workspace

      - name: West Init & Update
        run: |
          cd zmk-workspace
          west init -l app/
          west update
          west zephyr-export

      - name: Build Left
        run: |
          cd zmk-workspace
          west build -p -s app -b xiao_ble -- -DSHIELD=roBa_L -DZMK_CONFIG="${GITHUB_WORKSPACE}/config/config" -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 ../roBa_L.uf2

      - name: Build Right
        run: |
          cd zmk-workspace
          west build -p -s app -b xiao_ble -- -DSHIELD=roBa_R -DZMK_CONFIG="${GITHUB_WORKSPACE}/config/config" -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 ../roBa_R.uf2

      - name: Build Reset
        run: |
          cd zmk-workspace
          west build -p -s app -b xiao_ble -- -DSHIELD=settings_reset -DZMK_CONFIG="${GITHUB_WORKSPACE}/config/config" -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 ../settings_reset.uf2

      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: roBa_firmware_all
          path: "*.uf2"
